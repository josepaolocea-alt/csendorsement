name: RR Posting Reminder

on:
  schedule:
    # Runs every hour, on the hour (UTC). GitHub may delay this a few minutes under load.
    - cron: '0 * * * *'
  workflow_dispatch:   # lets you run it manually from the Actions tab (use this to test)

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Only RR timers that EXPIRE on/after this moment can trigger an email.
      # Set this to the date/time you go live. Format: ISO 8601 with timezone.
      GO_LIVE: '2026-05-18T00:00:00+08:00'

      FIREBASE_EMAIL: 'jpgc06.2023@gmail.com'
      FIREBASE_PASSWORD: ${{ secrets.FIREBASE_PASSWORD }}

      GMAIL_USER: 'jpgc06.2023@gmail.com'
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      MAIL_TO: 'customersupport@cynsolutions.ph'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install nodemailer@6 --no-save

      - name: Check RR timers and send reminders
        run: node scripts/rr-reminder.mjs
